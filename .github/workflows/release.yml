name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag is on main branch
        run: |
          if ! git branch --contains "$GITHUB_SHA" | grep -qE '(^|\s)main$'; then
            echo "::error::Tag is not on the main branch. Skipping release."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Write .env from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (envied + drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Inject google-services.json
        run: |
          dart run tool/inject_google_services.dart || echo "Warning: Firebase injection skipped"
        env:
          FIREBASE_PROJECT_NUMBER: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MOBILESDK_APP_ID: ${{ secrets.VITE_FIREBASE_ANDROID_APP_ID }}
          FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_ANDROID_API_KEY }}

      - name: Build release APK
        run: flutter build apk --flavor prod -t lib/main.dart --release

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > android/app/release-keystore.jks

      - name: Sign APK
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | tail -1)
          ${BUILD_TOOLS}apksigner sign \
            --ks android/app/release-keystore.jks \
            --ks-pass pass:${{ secrets.RELEASE_KEYSTORE_PASSWORD }} \
            --ks-key-alias ${{ secrets.RELEASE_KEY_ALIAS }} \
            --key-pass pass:${{ secrets.RELEASE_KEY_PASSWORD }} \
            --out build/app/outputs/flutter-apk/apex-v${{ steps.version.outputs.version }}.apk \
            build/app/outputs/flutter-apk/app-prod-release.apk

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \\[?${VERSION}\\]?/{found=1; next} /^## \\[?[0-9]/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release v${VERSION}"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            build/app/outputs/flutter-apk/apex-v${{ steps.version.outputs.version }}.apk \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/release_notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
